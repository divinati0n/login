<!DOCTYPE html>
<head>
    <meta name="viewport" 
    content="width=device-width"
    initial-scale="1.0">
    <title>
        User Login
    </title>
    <link rel="stylesheet"
    href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&display=swap');
    </style>
</head>
<body>
    <img src="assets/logo.jpg"
    alt="logo">
    <div class="box">
        <h1>
            USER LOGIN
        </h1>
        <form>
            <input id="username"
            name="username"
            placeholder=" Username"
            type="text">
            <br>
            <input id="password" 
            name="password"
            placeholder=" Password"
            type="password">
            <br>
            <br>
            <button type="submit">
                ENTER
            </button>
        </form>
    </div>
</body>
